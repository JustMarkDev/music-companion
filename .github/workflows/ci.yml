name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed areas
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.frontend_changes.outputs.changed }}
      rust: ${{ steps.rust_changes.outputs.changed }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect Rust changes
        id: rust_changes
        shell: bash
        run: |
          if git diff --name-only '${{ github.event.pull_request.base.sha }}' '${{ github.event.pull_request.head.sha }}' \
            | grep -Eq '^(src-tauri/|\.cargo/|rust-toolchain(\.toml)?$|Cargo\.(toml|lock)$|\.github/workflows/ci\.yml$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Rust-relevant changes detected."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No Rust-relevant changes detected."
          fi

      - name: Detect frontend changes
        id: frontend_changes
        shell: bash
        run: |
          if git diff --name-only '${{ github.event.pull_request.base.sha }}' '${{ github.event.pull_request.head.sha }}' \
            | grep -Eq '^(src/|public/|index\.html$|package\.json$|bun\.lock$|vite\.config\.|tsconfig\.|\.github/workflows/ci\.yml$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Frontend-relevant changes detected."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No frontend-relevant changes detected."
          fi

  frontend_static:
    name: Frontend static checks
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Check frontend
        run: bun run check

      - name: Lint frontend
        run: bun run lint

      - name: Check frontend formatting
        run: bun run format:check

      - name: Audit frontend dependencies
        run: bun audit

  rust_checks:
    name: Rust checks
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-latest
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Test Rust documentation
        run: cargo test --manifest-path src-tauri/Cargo.toml --doc

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit

  release_smoke:
    name: Release smoke
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

  pr_checks:
    name: Pull request checks
    if: always() && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    needs:
      - changes
      - frontend_static
      - rust_checks
      - release_smoke

    steps:
      - name: Verify required jobs passed
        shell: bash
        run: |
          results=('${{ needs.changes.result }}')

          if printf '%s\n' "${results[@]}" | grep -Eq '^(failure|cancelled|skipped)$'; then
            echo "::error::One or more required PR jobs did not pass: ${results[*]}"
            exit 1
          fi

          rust_changed='${{ needs.changes.outputs.rust }}'
          rust_result='${{ needs.rust_checks.result }}'
          frontend_changed='${{ needs.changes.outputs.frontend }}'
          frontend_static_result='${{ needs.frontend_static.result }}'
          release_smoke_result='${{ needs.release_smoke.result }}'

          if [[ "$rust_changed" == 'true' && "$rust_result" != 'success' ]]; then
            echo "::error::Rust changes were detected, but Rust checks did not pass: $rust_result"
            exit 1
          fi

          if [[ "$rust_changed" == 'false' && "$rust_result" != 'skipped' ]]; then
            echo "::error::No Rust changes were detected, but Rust checks had an unexpected result: $rust_result"
            exit 1
          fi

          if [[ "$frontend_changed" == 'true' && ( "$frontend_static_result" != 'success' || "$release_smoke_result" != 'success' ) ]]; then
            echo "::error::Frontend changes were detected, but frontend checks did not pass: $frontend_static_result, $release_smoke_result"
            exit 1
          fi

          if [[ "$frontend_changed" == 'false' && ( "$frontend_static_result" != 'skipped' || "$release_smoke_result" != 'skipped' ) ]]; then
            echo "::error::No frontend changes were detected, but frontend checks had unexpected results: $frontend_static_result, $release_smoke_result"
            exit 1
          fi

          echo "All required PR jobs passed."
