name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed areas
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.rust_changes.outputs.changed }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect Rust changes
        id: rust_changes
        shell: bash
        run: |
          if git diff --name-only '${{ github.event.pull_request.base.sha }}' '${{ github.event.pull_request.head.sha }}' \
            | grep -Eq '^(src-tauri/|\.cargo/|rust-toolchain(\.toml)?$|Cargo\.(toml|lock)$|\.github/workflows/ci\.yml$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Rust-relevant changes detected."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No Rust-relevant changes detected."
          fi

  frontend_static:
    name: Frontend static checks
    if: github.event.pull_request.draft == false
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Check frontend
        run: bun run check

      - name: Lint frontend
        run: bun run lint

      - name: Check frontend formatting
        run: bun run format:check

  rust_checks:
    name: Rust checks
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-latest
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          cache-targets: false

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Test Rust
        run: cargo nextest run --manifest-path src-tauri/Cargo.toml

      - name: Test Rust documentation
        run: cargo test --manifest-path src-tauri/Cargo.toml --doc

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  release_smoke:
    name: Release smoke
    if: github.event.pull_request.draft == false
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

  pr_checks:
    name: Pull request checks
    if: always() && github.event.pull_request.draft == false
    runs-on: windows-latest
    needs:
      - changes
      - frontend_static
      - rust_checks
      - release_smoke

    steps:
      - name: Verify required jobs passed
        shell: pwsh
        run: |
          $results = @(
            '${{ needs.changes.result }}',
            '${{ needs.frontend_static.result }}',
            '${{ needs.release_smoke.result }}'
          )

          if ($results -contains 'failure' -or $results -contains 'cancelled' -or $results -contains 'skipped') {
            Write-Error "One or more required PR jobs did not pass: $($results -join ', ')"
            exit 1
          }

          $rustChanged = '${{ needs.changes.outputs.rust }}'
          $rustResult = '${{ needs.rust_checks.result }}'

          if ($rustChanged -eq 'true' -and $rustResult -ne 'success') {
            Write-Error "Rust changes were detected, but Rust checks did not pass: $rustResult"
            exit 1
          }

          if ($rustChanged -eq 'false' -and $rustResult -ne 'skipped') {
            Write-Error "No Rust changes were detected, but Rust checks had an unexpected result: $rustResult"
            exit 1
          }

          Write-Host "All required PR jobs passed."
