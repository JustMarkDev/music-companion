name: Release Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  frontend_checks:
    name: Frontend checks
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Check frontend
        run: bun run check

      - name: Lint frontend
        run: bun run lint

      - name: Check frontend formatting
        run: bun run format:check

      - name: Build frontend
        run: bun run build

  release:
    name: Build and publish Windows installers
    runs-on: windows-latest
    needs: frontend_checks
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Test Rust documentation
        run: cargo test --manifest-path src-tauri/Cargo.toml --doc

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: Music Companion v__VERSION__
          releaseBody: |
            Music Companion per Windows.

            Scarica l'installer NSIS (`.exe`).
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: --target x86_64-pc-windows-msvc
