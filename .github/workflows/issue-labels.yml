name: Issue Labels

on:
  push:
    branches:
      - main
    paths:
      - .github/ISSUE_TEMPLATE/**
      - .github/workflows/issue-labels.yml
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    name: Sync issue labels
    runs-on: ubuntu-24.04

    steps:
      - name: Ensure managed labels exist
        uses: actions/github-script@v8
        with:
          script: |
            const managedLabels = [
              {
                name: "bug",
                color: "d73a4a",
                description: "Something is broken or behaving incorrectly.",
              },
              {
                name: "feature",
                color: "a2eeef",
                description: "Focused product or implementation improvement.",
              },
              {
                name: "task",
                color: "c5def5",
                description: "Maintenance, documentation, or technical work.",
              },
              {
                name: "needs-triage",
                color: "fbca04",
                description: "Issue needs maintainer review and categorization.",
              },
              {
                name: "agent-ready",
                color: "0e8a16",
                description: "Issue has enough context, acceptance criteria, and constraints for agent implementation.",
              },
              {
                name: "dependencies",
                color: "0366d6",
                description: "Dependency update or dependency-related maintenance.",
              },
              {
                name: "needs-review",
                color: "5319e7",
                description: "Change is ready for maintainer review.",
              },
            ];

            for (const label of managedLabels) {
              try {
                const { data: existing } = await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });

                if (
                  existing.color !== label.color ||
                  (existing.description ?? "") !== label.description
                ) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                }
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                } catch (createError) {
                  if (createError.status !== 422) {
                    throw createError;
                  }
                }
              }
            }
